# ──────────────────────────────────────────────
# Application Info
# ──────────────────────────────────────────────
spring.application.name=data-preprocessing-service

# ──────────────────────────────────────────────
# Server Configuration
# ──────────────────────────────────────────────
server.port=8000

# ──────────────────────────────────────────────
# Input / Output File Paths
# ──────────────────────────────────────────────
preprocessing.input.file=src/main/resources/input.xlsx
preprocessing.output.file=src/main/resources/output.csv

# ──────────────────────────────────────────────
# Missing Value Strategy
# Options: MEAN, MEDIAN, MODE, CONSTANT, DROP
# ──────────────────────────────────────────────
preprocessing.missing.value.strategy=MEAN
preprocessing.missing.value.constant=0

# ──────────────────────────────────────────────
# Duplicate Removal
# ──────────────────────────────────────────────
preprocessing.remove.duplicates=true

# ──────────────────────────────────────────────
# Categorical Encoding
# Options: LABEL, ONE_HOT
# ──────────────────────────────────────────────
preprocessing.encoding.strategy=LABEL
preprocessing.categorical.columns=department,gender,education_level

# ──────────────────────────────────────────────
# Numerical Normalization
# Options: MIN_MAX, Z_SCORE
# ──────────────────────────────────────────────
preprocessing.normalization.strategy=MIN_MAX
preprocessing.numeric.columns=age,salary,experience_years,performance_score

# ──────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.kumaran.preprocessing=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n